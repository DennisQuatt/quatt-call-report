function calc(pid){var pr=getPeriod(pid);var ds=pr.dates,nd=Math.max(ds.length,1);var res=D.map(function(a){var ib=0,ob=0,mi=0,sd=0,mx=0,kd=0,o3=0;ds.forEach(function(d){var v=a.p[d];if(!v)return;ib+=v[0];ob+=v[1];mi+=v[2];sd+=v[3];mx=Math.max(mx,v[4]);kd+=v[5];o3+=v[6]});var t=ib+ob,c=t-mi,av=c>0?Math.round(sd/c):0;return{name:a.n,team:TN[a.t],inbound:ib,outbound:ob,total:t,missed:mi,sumDur:sd,avgDur:av,maxDur:mx,avgDay:+(t/nd).toFixed(1),known:kd,over30:o3}});var names={};res.forEach(function(a){names[a.name]=1});["C","S","H"].forEach(function(tc){(ROSTER[tc]||[]).forEach(function(n){if(!names[n]){res.push({name:n,team:TN[tc],inbound:0,outbound:0,total:0,missed:0,sumDur:0,avgDur:0,maxDur:0,avgDay:0,known:0,over30:0})}})});return res}

function combinedTeamH(nm,co,pid,metrics){
  var callData=calc(pid);
  var callMap={};callData.forEach(function(a){callMap[a.name]=a});
  var sfDates=getPeriod(pid).dates.map(sfShift);

  var showConv=nm!=="Sales Support";
  var rows=teamAgents.map(function(a){
    var c=callMap[a.n]||{total:0,inbound:0,outbound:0,over30:0,known:0,sumDur:0};
    var mt=0,qs=0,qa=0,rv=0;
    sfDates.forEach(function(d){mt+=(SF_MEETINGS[a.n]||{})[d]||0;qs+=(SF_QUOTES_SENT[a.n]||{})[d]||0;qa+=(SF_QUOTES_ACCEPTED[a.n]||{})[d]||0;rv+=(SF_REVENUE[a.n]||{})[d]||0});
    return{name:a.n,calls:c.total,ib:c.inbound,ob:c.outbound,o3:c.over30,kd:c.known,meetings:mt,qsent:qs,qaccepted:qa,revenue:rv}
  });
  var sortKey=showCalls?'calls':showRev?'revenue':showMt?'meetings':showQs?'qsent':'qaccepted';
  rows.sort(function(a,b){return b[sortKey]-a[sortKey]});
  var totC=0,totM=0,totQs=0,totQa=0,totRv=0;
  rows.forEach(function(r){totC+=r.calls;totM+=r.meetings;totQs+=r.qsent;totQa+=r.qaccepted;totRv+=r.revenue});
  var h='<div style="margin-bottom:28px">';
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
  h+='<div style="width:4px;height:22px;border-radius:2px;background:'+co+'"></div>';

  h+='<span class="bdg" style="background:'+co+'18;color:'+co+'">'+teamAgents.length+' agents</span></div>';
  h+='<div class="sts" style="gap:6px;margin-bottom:8px">';
  if(showCalls)h+=smH('Calls',totC.toLocaleString(),co);
  if(showMt)h+=smH('Meetings',totM.toLocaleString(),'var(--blue)');
  if(showQs)h+=smH('Q.Sent',totQs.toLocaleString(),'var(--purple)');
  if(showQa)h+=smH('Accepted',totQa.toLocaleString(),'var(--green)');
  if(showRev)h+=smH('Revenue',fEur(totRv),'var(--green)');
  if(showConv){var convTot=totM>0?((totQa/totM)*100).toFixed(0):'—';h+=smH('Conv%',convTot+'%','var(--accent)')}
  h+='</div>';
  h+='<div class="tw"><div class="tsc"><table><thead><tr>';
  h+='<th style="text-align:left;padding-left:14px;min-width:155px">Agent</th>';
  if(showCalls)h+='<th>Calls</th><th>Out</th><th>In</th><th>&gt;30s</th>';
  if(showMt)h+='<th>Meetings</th>';
  if(showQs)h+='<th>Q.Sent</th>';
  if(showQa)h+='<th>Accepted</th>';
  if(showRev)h+='<th>Revenue</th>';
  if(showConv)h+='<th>Conv%</th>';
  h+='</tr></thead><tbody>';
  rows.forEach(function(a,i){
    var bgRk=i<3?co+'22':'rgba(255,255,255,0.04)';
    var fcRk=i<3?co:'var(--dim)';
    var r30=a.kd>0?((a.o3/a.kd)*100).toFixed(0)+'%':'—';
    var cc=a.calls===0?'var(--red)':co;
    h+='<tr>';

    h+='<span style="color:var(--warm);font-weight:500">'+a.name+'</span></td>';
    if(showCalls){
      h+='<td class="mono" style="color:'+cc+';font-weight:700;font-size:15px">'+a.calls+'</td>';
      h+='<td class="mono" style="color:var(--blue)">'+a.ob+'</td>';
      h+='<td class="mono" style="color:var(--green)">'+a.ib+'</td>';
      h+='<td class="mono" style="color:var(--accent)">'+a.o3+' <span style="font-size:10px;color:var(--dim)">('+r30+')</span></td>'
    }
    if(showMt)h+='<td class="mono" style="color:var(--blue)">'+a.meetings+'</td>';
    if(showQs)h+='<td class="mono" style="color:var(--purple)">'+a.qsent+'</td>';
    if(showQa)h+='<td class="mono" style="color:var(--green);font-weight:600">'+a.qaccepted+'</td>';
    if(showRev)h+='<td class="mono" style="color:var(--green)">'+fEur(a.revenue)+'</td>';

    h+='</tr>'
  });
  h+='</tbody></table></div></div></div>';
  return h
}

(function(){
  document.getElementById('upd-badge').textContent='Loading…';
  var _loadTime=Date.now();
  setInterval(function(){location.reload();},600000);
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&Date.now()-_loadTime>=600000){location.reload();}});
  function applyData(data){
    D=data.calls;PERIODS=data.periods;
    var sf=data.sf||{};
    if(sf.meetings&&Object.keys(sf.meetings).length>0){
      try{localStorage.setItem('quatt_sf',JSON.stringify(sf));}catch(e){}
    } else {
      try{var bk=JSON.parse(localStorage.getItem('quatt_sf'));if(bk)sf=bk;}catch(e){}
    }
    SF_MEETINGS=sf.meetings||{};SF_QUOTES_SENT=sf.quotes_sent||{};
    SF_QUOTES_ACCEPTED=sf.quotes_accepted||{};SF_REVENUE=sf.revenue||{};
    var upd=(data.updated||'').replace('T',' ').substring(0,16)+' UTC';
    document.getElementById('upd-badge').textContent='Last updated: '+upd+' · auto-updates every 10min';
    document.getElementById('upd-footer').textContent='48 agents across 3 teams · Source: Aircall + Snowflake · Updated: '+upd;
    render();
  }
  fetch('data.json?t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error(r.status);return r.json();})
    .then(function(data){applyData(data);})
    .catch(function(e){
      console.error('data.json load failed',e);
      document.getElementById('upd-badge').textContent='Refresh failed — showing cached data';
      try{var bk=JSON.parse(localStorage.getItem('quatt_sf'));if(bk){SF_MEETINGS=bk.meetings||{};SF_QUOTES_SENT=bk.quotes_sent||{};SF_QUOTES_ACCEPTED=bk.quotes_accepted||{};SF_REVENUE=bk.revenue||{};}}catch(e2){}
      if(D.length>0)render();
    });
})();
