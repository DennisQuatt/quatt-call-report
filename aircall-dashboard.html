  {id:"alltime",label:"All Time",dates:["01-02","01-05","01-06","01-07","01-08","01-09","01-12","01-13","01-14","01-15","01-16","01-19","01-20","01-21","01-22","01-23","01-26","01-27","01-28","01-29","01-30","02-02","02-03","02-04","02-05","02-06","02-09","02-10","02-11","02-12","02-13","02-14","02-15","02-16","02-17","02-18","02-19","02-20","02-23","02-24","02-25","02-26","02-27","02-28","03-02","03-03","03-04","03-05","03-06","03-09","03-10","03-11","03-12","03-13","03-16","03-17","03-18","03-19","03-20","03-22","03-23","03-24","03-25","03-26","03-27","03-28","03-30","03-31","04-01","04-02","04-03","04-07","04-08","04-09"],desc:"Jan 1 to Apr 9"}
];

function getPeriod(id){for(var i=0;i<PERIODS.length;i++){if(PERIODS[i].id===id)return PERIODS[i]}return PERIODS[6]}

function calc(pid){var pr=getPeriod(pid);var ds=pr.dates,nd=Math.max(ds.length,1);var res=D.map(function(a){var ib=0,ob=0,mi=0,sd=0,mx=0,kd=0,o3=0;ds.forEach(function(d){var v=a.p[d];if(!v)return;ib+=v[0];ob+=v[1];mi+=v[2];sd+=v[3];mx=Math.max(mx,v[4]);kd+=v[5];o3+=v[6]});var t=ib+ob,c=t-mi,av=c>0?Math.round(sd/c):0;return{name:a.n,team:TN[a.t],inbound:ib,outbound:ob,total:t,missed:mi,sumDur:sd,avgDur:av,maxDur:mx,avgDay:+(t/nd).toFixed(1),known:kd,over30:o3}});var names={};res.forEach(function(a){names[a.name]=1});["C","S","H"].forEach(function(tc){(ROSTER[tc]||[]).forEach(function(n){if(!names[n]){res.push({name:n,team:TN[tc],inbound:0,outbound:0,total:0,missed:0,sumDur:0,avgDur:0,maxDur:0,avgDay:0,known:0,over30:0})}})});return res}

function fmt(s){if(!s)return"0:00";var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(ss).padStart(2,"0"):m+":"+String(ss).padStart(2,"0")}
function fH(s){if(!s)return"0m";var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+"h "+m+"m":m+"m"}
function sH(l,v,c,s){return'<div class="st"><div class="sl">'+l+'</div><div class="sv mono" style="color:'+c+'">'+v+"</div>"+(s?'<div class="ss">'+s+"</div>":"")+"</div>"}
function smH(l,v,c,s){return'<div class="sm"><div class="sml">'+l+'</div><div class="smv mono" style="color:'+c+'">'+v+"</div>"+(s?'<div style="font-size:10px;color:var(--dim);margin-top:1px">'+s+"</div>":"")+"</div>"}

function tblH(ag,co){
  var so=ag.slice().sort(function(a,b){return sDir==="desc"?b[sBy]-a[sBy]:a[sBy]-b[sBy]});
  var ar=function(k){return sBy===k?(sDir==="desc"?" \u2193":" \u2191"):""};
  var h='<div class="tw"><div class="tsc"><table><thead><tr><th style="text-align:left;padding-left:14px;min-width:200px">Agent</th><th data-s="total">Total'+ar("total")+'</th><th data-s="outbound">Out'+ar("outbound")+'</th><th data-s="inbound">In'+ar("inbound")+'</th><th data-s="known">Known Dur'+ar("known")+'</th><th data-s="over30">&gt;30s'+ar("over30")+'</th><th data-s="sumDur">Tot Dur'+ar("sumDur")+'</th><th data-s="avgDur">Avg Dur'+ar("avgDur")+'</th><th data-s="maxDur">Max Dur'+ar("maxDur")+'</th><th data-s="avgDay">Avg/Day'+ar("avgDay")+'</th></tr></thead><tbody>';
  so.forEach(function(a,i){var r30=a.known>0?((a.over30/a.known)*100).toFixed(0):"0";
  h+="<tr><td><span class='rk' style='background:"+(i<3?co+"22":"rgba(255,255,255,0.04)")+";color:"+(i<3?co:"var(--dim)")+"'>"+(i+1)+"</span><span style='color:var(--warm);font-weight:500'>"+a.name+"</span></td>";
  h+="<td class='mono' style='color:"+(a.total===0?"var(--red)":co)+";font-weight:700;font-size:15px'>"+(a.total===0?"0":a.total)+"</td>";
  h+="<td class='mono' style='color:var(--blue);font-weight:600'>"+a.outbound+"</td>";
  h+="<td class='mono' style='color:var(--green);font-weight:600'>"+a.inbound+"</td>";
  h+="<td class='mono' style='color:var(--warm2)'>"+a.known+"</td>";
  h+="<td class='mono' style='color:var(--accent);font-weight:600'>"+a.over30+" <span style='font-size:10px;color:var(--dim)'>("+r30+"%)</span></td>";
  h+="<td class='mono'>"+fH(a.sumDur)+"</td><td class='mono'>"+fmt(a.avgDur)+"</td><td class='mono'>"+fmt(a.maxDur)+"</td>";
  h+="<td class='mono' style='color:var(--accent)'>"+a.avgDay+"</td></tr>"});
  return h+"</tbody></table></div></div>"}

function teamH(nm,ag,dy,co){
  var filteredAg=ag;
  if(vw==="Call Team"||vw==="Sales Support"||vw==="HV Team"){filteredAg=ag.filter(function(a){return a.team===vw})}
  var ib=0,ob=0,sd=0,mx=0,kd=0,o3=0,mi=0;filteredAg.forEach(function(a){ib+=a.inbound;ob+=a.outbound;sd+=a.sumDur;mx=Math.max(mx,a.maxDur);kd+=a.known;o3+=a.over30;mi+=a.missed});
  var t=ib+ob,c=t-mi,av=c>0?Math.round(sd/c):0;
  var h='<div style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div style="width:4px;height:26px;border-radius:2px;background:'+co+'"></div><h3 style="font-size:17px;font-weight:700;color:var(--warm);letter-spacing:-0.3px">'+nm+'</h3><span class="bdg" style="background:'+co+'18;color:'+co+'">'+ag.length+' agents</span></div>';
  h+='<div class="sts" style="gap:8px">'+smH("Total",t,co)+smH("Outbound",ob,"var(--blue)")+smH("Inbound",ib,"var(--green)")+smH("Known Dur",kd,"var(--warm2)")+smH(">30s",o3,"var(--accent)",kd>0?((o3/kd)*100).toFixed(0)+"%":"")+smH("Total Dur",fH(sd),"var(--warm2)")+smH("Avg Dur",fmt(av),"var(--warm2)")+smH("Max Dur",fmt(mx),"var(--orange)")+smH("Avg/Day",(t/dy).toFixed(1),"var(--accent)")+"</div>";
  h+=tblH(ag,co)+"</div>";return h}

function top10H(ag){
  var so=ag.slice().sort(function(a,b){return b.total-a.total}).slice(0,10);
  var mx=so[0]?so[0].total:1;
  var h='<div style="margin-bottom:28px"><div style="display:flex;align-items:center;gap:12px;margin-bottom:16px"><div style="width:4px;height:26px;border-radius:2px;background:var(--accent)"></div><h3 style="font-size:17px;font-weight:700;color:var(--warm);letter-spacing:-0.3px">Top 10 Leaderboard</h3></div>';
  h+='<div class="tw" style="padding:6px 0">';
  so.forEach(function(a,i){
    var co=TC[a.team]||"var(--dim)";var bg=i<3?"rgba(200,245,66,0.04)":"transparent";var rc=i<3?medal[i]:"var(--dim)";var w=mx>0?(a.total/mx)*100:0;
    var r30=a.known>0?((a.over30/a.known)*100).toFixed(0):"0";
    h+='<div class="lb" style="background:'+bg+'"><div class="lb-r" style="background:'+rc+'18;color:'+rc+'">'+(i+1)+'</div>';
    h+='<div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:14px;font-weight:600;color:var(--warm)">'+a.name+'</span><div style="display:flex;gap:12px;align-items:center"><span class="bdg" style="background:'+co+'18;color:'+co+';font-size:10px">'+a.team+'</span><span class="mono" style="font-size:20px;font-weight:700;color:'+rc+'">'+a.total+'</span></div></div>';
    h+='<div style="display:flex;height:6px;border-radius:3px;overflow:hidden;background:rgba(255,255,255,0.05)"><div style="width:'+w+'%;background:'+co+';border-radius:3px"></div></div>';
    h+='<div style="display:flex;gap:18px;font-size:11px;color:var(--dim);margin-top:5px"><span>Out: <span class="mono" style="color:var(--blue)">'+a.outbound+'</span></span><span>In: <span class="mono" style="color:var(--green)">'+a.inbound+'</span></span><span>&gt;30s: <span class="mono" style="color:var(--accent)">'+a.over30+' ('+r30+'%)</span></span><span>Avg: <span class="mono">'+fmt(a.avgDur)+'</span></span><span>Talk: <span class="mono">'+fH(a.sumDur)+'</span></span></div>';
    h+='</div></div>';
  });
  h+='</div></div>';return h}

function render(){
  var pr=getPeriod(per);
  var ag=calc(per);
  var ds=Math.max(pr.dates.length,1);
  var teams={};["Call Team","Sales Support","HV Team"].forEach(function(t){teams[t]=ag.filter(function(a){return a.team===t})});
  var filteredAg=ag;
  if(vw==="Call Team"||vw==="Sales Support"||vw==="HV Team"){filteredAg=ag.filter(function(a){return a.team===vw})}
  var ib=0,ob=0,sd=0,mx=0,kd=0,o3=0,mi=0;filteredAg.forEach(function(a){ib+=a.inbound;ob+=a.outbound;sd+=a.sumDur;mx=Math.max(mx,a.maxDur);kd+=a.known;o3+=a.over30;mi+=a.missed});
  var t=ib+ob,c=t-mi,av=c>0?Math.round(sd/c):0;

  document.getElementById("sub").textContent=pr.desc+" \u00b7 "+pr.dates.length+" day"+(pr.dates.length!==1?"s":"")+" \u00b7 "+ag.length+" agents";
  document.getElementById("fl").textContent=pr.desc;

  var pp=document.getElementById("pp");pp.innerHTML="";
  PERIODS.forEach(function(p){var b=document.createElement("button");b.className="pl"+(per===p.id?" a":"");b.textContent=p.label;b.onclick=function(){per=p.id;render()};pp.appendChild(b)});

  var vp=document.getElementById("vp");vp.innerHTML="";
  [["all","All Teams","g"],["Call Team","Call Team","c"],["Sales Support","Sales Support","s"],["HV Team","HV Team","h"],["top10","Top 10","g"]].forEach(function(v){
    var b=document.createElement("button");b.className="pl"+(vw===v[0]?" a":"");b.setAttribute("data-c",v[2]);b.textContent=v[1];b.onclick=function(){vw=v[0];render()};vp.appendChild(b)});

  document.getElementById("gs").innerHTML=sH("Total Calls",t.toLocaleString(),"var(--warm)")+sH("Outbound",ob.toLocaleString(),"var(--blue)",t>0?((ob/t)*100).toFixed(1)+"%":"")+sH("Inbound",ib.toLocaleString(),"var(--green)",t>0?((ib/t)*100).toFixed(1)+"%":"")+sH("Known Duration",kd.toLocaleString(),"var(--warm2)","calls with in-call time")+sH("Over 30s",o3.toLocaleString(),"var(--accent)",kd>0?((o3/kd)*100).toFixed(0)+"% of known":"")+sH("Total Talk",fH(sd),"var(--purple)")+sH("Avg Duration",fmt(av),"var(--warm2)")+sH("Max Duration",fmt(mx),"var(--orange)");

  if(vw==="all"){var h='<div class="cd"><div class="ct">Team Comparison</div><div style="display:flex;gap:20px;flex-wrap:wrap">';
  ["Call Team","Sales Support","HV Team"].forEach(function(tn){var ta=teams[tn]||[];var ti=0,to2=0,tk=0,t3=0;ta.forEach(function(a){ti+=a.inbound;to2+=a.outbound;tk+=a.known;t3+=a.over30});var tt=ti+to2;var pc=t>0?((tt/t)*100).toFixed(0):0;var co=TC[tn];
  h+='<div style="flex:1;min-width:200px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:10px;height:10px;border-radius:3px;background:'+co+'"></div><span style="font-size:14px;font-weight:600;color:var(--warm)">'+tn+'</span><span style="font-size:12px;color:var(--dim)">('+ta.length+')</span></div><div style="display:flex;gap:12px;font-size:13px;flex-wrap:wrap"><div><span style="color:var(--dim)">Total: </span><span class="mono" style="color:'+co+';font-weight:700">'+tt+'</span><span style="color:var(--dim);font-size:11px"> ('+pc+'%)</span></div><div><span style="color:var(--dim)">Out: </span><span class="mono" style="color:var(--blue)">'+to2+'</span></div><div><span style="color:var(--dim)">In: </span><span class="mono" style="color:var(--green)">'+ti+'</span></div><div><span style="color:var(--dim)">&gt;30s: </span><span class="mono" style="color:var(--accent)">'+t3+'</span></div></div></div>'});
  h+="</div></div>";document.getElementById("cc").innerHTML=h}else{document.getElementById("cc").innerHTML=""}

  var out="";
  if(vw==="top10"){out=top10H(ag)}
  else{
    if(vw==="all"||vw==="Call Team"){var ct2=teams["Call Team"]||[];if(ct2.length)out+=teamH("Call Team",ct2,ds,"#6eb5f5")}
    if(vw==="all"||vw==="Sales Support"){var ss2=teams["Sales Support"]||[];if(ss2.length)out+=teamH("Sales Support",ss2,ds,"#b89cf5")}
    if(vw==="all"||vw==="HV Team"){var hv2=teams["HV Team"]||[];if(hv2.length)out+=teamH("HV Team",hv2,ds,"#f5a623")}
  }
  document.getElementById("tm").innerHTML=out;
  document.querySelectorAll("th[data-s]").forEach(function(th){th.onclick=function(){var k=this.getAttribute("data-s");if(sBy===k)sDir=sDir==="desc"?"asc":"desc";else{sBy=k;sDir="desc"}render()}})
}
render();
